openapi: 3.0.3
info:
  title: 'Laravel API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
tags:
  -
    name: Endpoints
    description: ''
paths:
  /api/auth/send-otp:
    post:
      summary: ''
      operationId: postApiAuthSendOtp
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 'Must match the regex /^09[0-9]{9}$/.'
                  example: '09156277171'
              required:
                - phone
      security: []
  /api/auth/verify-otp:
    post:
      summary: ''
      operationId: postApiAuthVerifyOtp
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 'Must match the regex /^09[0-9]{9}$/.'
                  example: '09156277171'
                otp:
                  type: string
                  description: 'Must be 6 digits.'
                  example: '810798'
              required:
                - phone
                - otp
      security: []
  /api/me:
    get:
      summary: ''
      operationId: getApiMe
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
