      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 'Must be at least 3 characters. Must not be greater than 150 characters.'
                  example: vmqeopfuudtdsufvyvddq
                stock:
                  type: integer
                  description: ''
                  example: 17
                main_price:
                  type: string
                  description: ''
                  example: consequatur
                final_price:
                  type: string
                  description: ''
                  example: null
                  nullable: true
                attributes:
                  type: string
                  description: 'Must be a valid JSON string.'
                  example: '["consequatur","consequatur"]'
                category_id:
                  type: integer
                  description: 'Must match an existing stored value.'
                  example: 17
              required:
                - title
                - stock
                - main_price
                - attributes
                - category_id
      security: []
