  /api/auth/complete-registration:
    post:
      summary: ''
      operationId: postApiAuthCompleteRegistration
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must be at least 3 characters. Must not be greater than 255 characters.'
                  example: vmqeopfuudtdsufvyvddq
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: OP>@;4
                registration_token:
                  type: string
                  description: ''
                  example: consequatur
              required:
                - name
                - password
                - registration_token
      security: []
